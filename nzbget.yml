services:
  nzbget:
    container_name: nzbget
    image: ghcr.io/hotio/nzbget
    ports:
      - "7010:6789"
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.nzbget.rule=Host(`nzbget.lan.jbrio.net`)
      - traefik.http.routers.nzbget.entrypoints=websecure
      - traefik.http.routers.nzbget.tls=true
      - traefik.http.routers.nzbget.tls.certresolver=cloudflare
      - traefik.http.routers.nzbget.middlewares=lan-only
      - traefik.http.services.nzbget.loadbalancer.server.port=6789
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=America/Panama
    volumes:
      - ${HOME}/pods/nzbget/config:/config
      - /mnt/ark/content/usenet:/data/usenet
      - /mnt/tank/cache/nzbget:/cache
      - /mnt/staging/usenet/adult:/adult
      - /mnt/staging/usenet/films:/films
