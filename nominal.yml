  ollama:
    volumes:
      - /mnt/staging/ollama/ollama:/root/.ollama
    container_name: ollama
    # pull_policy: always
    tty: true
    # restart: unless-stopped
    image: ollama/ollama:latest
    ports:
      - 11434:11434
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    networks:
      - ollama-docker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama-webui
    volumes:
      - /mnt/staging/ollama/open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - 3000:8080
    environment: # https://docs.openwebui.com/getting-started/env-configuration#default_models
      - OLLAMA_BASE_URLS=http://host.docker.internal:11434 #comma separated ollama hosts
      # - ENV=dev
      # - WEBUI_AUTH=False
      # - WEBUI_NAME=valiantlynx AI
      # - WEBUI_URL=http://localhost:8080
      - WEBUI_SECRET_KEY=
    extra_hosts:
      - host.docker.internal:host-gateway
    # restart: unless-stopped
    networks:
      - ollama-docker

  miniflux:
    image: miniflux/miniflux:latest
    ports:
      - 8484:8080
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://miniflux:secret@db/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=password
      - SCHEDULER_ROUND_ROBIN_MIN_INTERVAL=10
      - POLLING_FREQUENCY=15
    networks:
      - miniflux-docker
  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Panama
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=secret
    volumes:
      - /mnt/staging/miniflux:/var/lib/postgresql/data
      # - miniflux-db:/mnt/staging/miniflux/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 10s
      start_period: 30s
    networks:
      - miniflux-docker

networks:
  ollama-docker:
    external: false
  miniflux-docker:
    external: false

