---
# version: "3.4"
services:
  transmission:
    image: lscr.io/linuxserver/transmission
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Panama
      - TRANSMISSION_WEB_HOME=/config/web #optional
    volumes:
      - ${HOME}/.config/transmission:/config
      - /mnt/staging/torrent:/downloads
      - /mnt/staging/torrent/monitor:/watch
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Panama
    volumes:
      - ${HOME}/.config/sabnzbd:/config
      - /mnt/staging/usenet:/downloads #optional
      - /mnt/staging/nzbs/sabhistory:/history #optional
      - /mnt/tank/sabnzbd/incomplete:/incomplete #optional
      - /mnt/tank/sabnzbd/admin:/admin #optional
      - /mnt/tank/sabnzbd/logs:/logs #optional
    ports:
      - 8008:8080
#    restart: unless-stopped
  
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Panama
    volumes:
      - ${HOME}/.config/Prowlarr:/config
    ports:
      - 9696:9696
  
  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Panama
    volumes:
      - ${HOME}/.config/Sonarr:/config
      - /mnt/staging/sonarr:/tv
      - /mnt/staging/nzbget/done/tvshows:/downloads
    ports:
      - 8989:8989

  # nzbget:
  #   image: lscr.io/linuxserver/nzbget:latest
  #   container_name: nzbget
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - TZ=America/Panama
  #     # - NZBGET_USER=nzbget #optional
  #     # - NZBGET_PASS=tegbzn6789 #optional
  #   volumes:
  #     - ${HOME}/.config/nzbget:/config
  #     # - /path/to/downloads:/downloads #optional
  #   ports:
  #     - 6789:6789
  #   restart: unless-stopped
  
  excalibur:
    image: ghcr.io/williamjacksn/excalibur
    container_name: excalibur
    init: true
    build: .
    ports:
      - 8081:8081
    volumes:
      - ${HOME}/.local/share/excalibur:/home/python/excalibur
    environment:
      HOST: 0.0.0.0
      PORT: 8081
  
  tabula:
    container_name: tabula
    init: true
    build:
      context: ${HOME}/.config/tabula
      dockerfile: ${HOME}/.config/tabula/Dockerfile
    ports:
      - 8080:8080
    environment:
      HOST: 0.0.0.0
      PORT: 8080
  
  glance:
    image: glanceapp/glance
    container_name: glance
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Panama
    volumes:
      - ${HOME}/.config:/app/config
    ports:
      - 8888:8080
 #   restart: unless-stopped
  
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000 # should be owner of volumes
    ports:
      - "4533:4533"
#    restart: unless-stopped
    environment:
      # Optional: put your config options customization here. Examples:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info  
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      ND_PLAYLISTSPATH: "."
    volumes:
      - ${HOME}/.local/share/navidrome:/data
      - "/mnt/storage/bbmusic/media:/music:ro"

#  jellyfin:
#    image: lscr.io/linuxserver/jellyfin:latest
#    container_name: jellyfin
#    environment:
#      - PUID=1000
#      - PGID=1000
#      - TZ=Etc/UTC
#      - JELLYFIN_PublishedServerUrl=192.168.0.5 #optional
#    volumes:
#      - ${HOME}/.config/jellyfin:/config
#      - /mnt/staging/jellyfin:/data/movies
#    ports:
#      - 8096:8096
#      - 8920:8920 #optional
#      - 7359:7359/udp #optional
#      - 1900:1900/udp #optional
#    restart: unless-stopped

  soulseek:
    image: realies/soulseek
    container_name: soulseek
    volumes:
      - /mnt/staging/soulseek/appdata:/data/.SoulseekQt
      - /mnt/staging/soulseek/downloads:/data/Soulseek Downloads
      - /mnt/staging/soulseek/logs:/data/Soulseek Chat Logs
      - /mnt/staging/soulseek/shared:/data/Soulseek Shared Folder
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - 6080:6080
      - 61122:61122 # example listening port, check Options -> Login
      - 61123:61123 # example obfuscated port, check Options -> Login

