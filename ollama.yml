services:
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - /mnt/staging/ollama/ollama:/root/.ollama
    # pull_policy: always
    tty: true
    # restart: unless-stopped
    ports:
      - 11434:11434
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    networks:
      - proxy
      - ollama-docker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama-webui
    volumes:
      - /mnt/staging/ollama/open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - 3000:8080
    environment: # https://docs.openwebui.com/getting-started/env-configuration#default_models
      - OLLAMA_BASE_URLS=http://host.docker.internal:11434 #comma separated ollama hosts
      # - ENV=dev
      # - WEBUI_AUTH=False
      # - WEBUI_NAME=valiantlynx AI
      # - WEBUI_URL=http://localhost:8080
      - WEBUI_SECRET_KEY=
    extra_hosts:
      - host.docker.internal:host-gateway
    # restart: unless-stopped
    networks:
      - proxy
      - ollama-docker

networks:
  ollama-docker:
    external: false
  proxy:
    external: true
