services:
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - /mnt/staging/ollama/ollama:/root/.ollama
    # pull_policy: always
    tty: true
    # restart: unless-stopped
    ports:
      - 11434:11434
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    networks:
      - proxy
      - ollama-docker
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.ollama.rule=Host(`ollama.lan.jbrio.net`)
      - traefik.http.routers.ollama.entrypoints=websecure
      - traefik.http.routers.ollama.tls=true
      - traefik.http.routers.ollama.tls.certresolver=cloudflare
      - traefik.http.routers.ollama.middlewares=lan-only
      - traefik.http.services.ollama.loadbalancer.server.port=11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama-webui
    volumes:
      - /mnt/staging/ollama/open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - 3000:8080
    environment: # https://docs.openwebui.com/getting-started/env-configuration#default_models
      - OLLAMA_BASE_URLS=http://host.docker.internal:11434 #comma separated ollama hosts
      # - ENV=dev
      # - WEBUI_AUTH=False
      # - WEBUI_NAME=valiantlynx AI
      # - WEBUI_URL=http://localhost:8080
      - WEBUI_SECRET_KEY=
    extra_hosts:
      - host.docker.internal:host-gateway
    # restart: unless-stopped
    networks:
      - proxy
      - ollama-docker
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.ollama-ui.rule=Host(`ollama-ui.lan.jbrio.net`)
      - traefik.http.routers.ollama-ui.entrypoints=websecure
      - traefik.http.routers.ollama-ui.tls=true
      - traefik.http.routers.ollama-ui.tls.certresolver=cloudflare
      - traefik.http.routers.ollama-ui.middlewares=lan-only
      - traefik.http.services.ollama-ui.loadbalancer.server.port=8080

networks:
  ollama-docker:
    external: false
  proxy:
    external: true
