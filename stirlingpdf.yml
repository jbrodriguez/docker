version: '3.3'
services:
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    ports:
      - '8787:8080'
    volumes:
      - /mnt/staging/stirlingpdf/training:/usr/share/tessdata # Required for extra OCR languages
      - /mnt/staging/stirlingpdf/extra:/configs
      - /mnt/staging/stirlingpdf/custom:/customFiles/
      - /mnt/staging/stirlingpdf/logs:/logs/
      - /mnt/staging/stirlingpdf/pipeline:/pipeline/
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - LANGS=en_US

