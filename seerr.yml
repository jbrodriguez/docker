services:
  seerr:
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    environment:
      - LOG_LEVEL=debug
      - PUID=1000
      - PGID=1000
      # - UMASK=002
      - TZ=America/Panama
      # - PORT=5055 #optional
    ports:
      - 7060:5055
    networks:
      - proxy
    volumes:
      - ${HOME}/pods/seerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
