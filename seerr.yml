services:
  seerr:
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    environment:
      - LOG_LEVEL=debug
      - PUID=1000
      - PGID=1000
      # - UMASK=002
      - TZ=America/Panama
      # - PORT=5055 #optional
    ports:
      - 7060:5055
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.seerr.rule=Host(`seerr.lan.jbrio.net`)
      - traefik.http.routers.seerr.entrypoints=websecure
      - traefik.http.routers.seerr.tls=true
      - traefik.http.routers.seerr.tls.certresolver=cloudflare
      - traefik.http.routers.seerr.middlewares=lan-only
      - traefik.http.services.seerr.loadbalancer.server.port=5055
    volumes:
      - ${HOME}/pods/seerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
