services:
  tabula:
    container_name: tabula
    init: true
    build:
      context: ${HOME}/pods/tabula/config
      dockerfile: ${HOME}/pods/tabula/config/Dockerfile
    ports:
      - 8080:8080
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.tabula.rule=Host(`tabula.lan.jbrio.net`)
      - traefik.http.routers.tabula.entrypoints=websecure
      - traefik.http.routers.tabula.tls=true
      - traefik.http.routers.tabula.tls.certresolver=cloudflare
      - traefik.http.routers.tabula.middlewares=lan-only
      - traefik.http.services.tabula.loadbalancer.server.port=8080
    environment:
      HOST: 0.0.0.0
      PORT: 8080
  
