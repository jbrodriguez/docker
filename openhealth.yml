name: openhealth

services:
  openhealth-database:
    image: postgres:alpine
    # restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks: # <--- Add this
      - ollama-docker # Ensure database is also on this network if 'app' connects to it from here


  docling-serve:
    image: ghcr.io/ds4sd/docling-serve:latest
    # restart: always
    networks: # <--- Add this
      - ollama-docker # Ensure database is also on this network if 'app' connects to it from here


  openhealth-app:
    build:
      context: /mnt/staging/openhealth/open-health/
      dockerfile: /mnt/staging/openhealth/open-health/Containerfile
    depends_on:
      - openhealth-database
      - docling-serve
    volumes:
      - /mnt/staging/openhealth/data:/app/public/uploads
    ports:
      - "3535:3000"
    # restart: always
    env_file: # <--- ADD THIS SECTION
      - ./.env # <--- Specify the path to your .env file
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@openhealth-database:5432/${POSTGRES_DB}
    networks: # <--- Add this
      - ollama-docker # Ensure database is also on this network if 'app' connects to it from here


volumes:
  postgres_data:
  app_data:
