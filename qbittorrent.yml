services:
  qbittorrent:
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:release-5.1.0
    ports:
      - "7020:8080"
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.lan.jbrio.net`)
      - traefik.http.routers.qbittorrent.entrypoints=websecure
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.routers.qbittorrent.tls.certresolver=cloudflare
      - traefik.http.routers.qbittorrent.middlewares=lan-only
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=America/Panama
      - WEBUI_PORTS=8080/tcp,8080/udp
    volumes:
      - ${HOME}/pods/qbittorrent/config:/config
      - /mnt/ark/content/torrents:/data/torrents
