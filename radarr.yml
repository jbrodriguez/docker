services:
  radarr:
    container_name: radarr
    image: ghcr.io/hotio/radarr
    ports:
      - "7030:7878"
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`radarr.lan.jbrio.net`)
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.tls=true
      - traefik.http.routers.radarr.tls.certresolver=cloudflare
      - traefik.http.routers.radarr.middlewares=lan-only
      - traefik.http.services.radarr.loadbalancer.server.port=7878
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=America/Panama
    volumes:
      - ${HOME}/pods/radarr/config:/config
      - /mnt/ark/content:/data
